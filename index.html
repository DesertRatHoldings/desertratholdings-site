<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Desert Rat Holdings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #121212;
        color: #E6D3A3;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }

    .container {
        text-align: center;
        max-width: 600px;
        padding: 20px;
        border: 1px solid #7A4E2D;
        border-radius: 6px;
    }

    .logo {
        width: 130px;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 26px;
        letter-spacing: 2px;
        font-weight: 600;
    }

    p {
        color: #CBB892;
        font-size: 14px;
        margin-top: 10px;
    }

    .divider {
        margin: 25px auto;
        width: 70px;
        height: 2px;
        background: #B87333;
    }

    .tag {
        display: inline-block;
        margin-top: 15px;
        padding: 5px 10px;
        border: 1px solid #B87333;
        font-size: 11px;
        color: #B87333;
        letter-spacing: 1px;
    }

    .footer {
        margin-top: 30px;
        font-size: 12px;
        color: #6B7280;
    }
</style>
</head>
<body>

<div class="container">
    <img src="logo.png" class="logo" alt="Desert Rat Logo">

    <h1>DESERT RAT HOLDINGS</h1>
    <div class="divider"></div>

    <p>Private asset holding and operational control layer.</p>
    <p>Managing systems, intellectual property, and subsidiary ventures.</p>

    <div class="tag">VERIFIED ENTITY</div>

    <div class="footer">
        United States • Private Infrastructure
    </div>
</div>

</body>
</html>
